    <!-- Section for Displaying body content starts here -->
    <div style="margin-top:36px;"></div>

    <center>

     <!-- Section for Displaying Simple Interest Calculations -->

     <!-- Section for Displaying Simple Interest Calculations -->


        <div id="ResultDisplay" class="alert alert-primary" role="alert" style="max-width: 540px; display: none;">
         <b>Your Simple Interest is: &#8377;</b> <label id="simpleInterestResult"></label>
        </div>
        

        <div class="card mb-3" style="max-width: 540px;">

  <div class="row no-gutters">
    <div class="col-md-4">
      <img src="./images/SI_Calculator.jpeg" alt="..." style="width: 220px; height: 250px;">
    </div>
    <div class="col-md-8">
      <div class="card-body">
        <h5 class="card-title"><b><u>Simple Interest Calculator</u></b></h5>

        <!-- section for form starts here -->
            <form method="post" action="">

              <div class="form-group">
                <label class="text-left">Enter Principal Amount</label>
                <input type="number" class="form-control" id="principal_amount" aria-describedby="emailHelp">               
              </div>

              <div class="form-group">
                <label class="text-left">Enter Time (in years)</label>
                <input type="number" class="form-control" id="time" aria-describedby="emailHelp">               
              </div>

              <div class="form-group">
                <label class="text-left">Enter Rate of Interest (%)</label>
                <input type="number" class="form-control" id="rateofinterest" aria-describedby="emailHelp" max="9" min="1" onfocusout="calculateInterest()">
              </div>             
               
                    <div class="container">

                      <div class="row">
                        <div class="col-sm-6">
                             <button type="button" class="btn btn-primary form-control" onclick="displayResult()">Calculate SI</button>
                        </div>

                        <div class="col-sm-6">
                             <button type="button" class="btn btn-danger form-control" onclick="resetResult()">Reset</button>
                        </div>

                      </div>
                     
                    </div>

             

            </form>
        <!-- section for form ends here -->

      </div>
    </div>
  </div>

</div>

  <!-- Section for Displaying Rate Calculation starts here -->
  <small class="text-danger" style="font-weight: bolder; font-size: 14px;">** Rate of Interest: <span style="color: #581845" id="newAmount">Rate of Interest will change accordingly</span> </small>


  <!-- Section for Displaying Rate Calculation ends here -->
